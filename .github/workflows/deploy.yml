      #     key: ${{ secrets.SERVER_SSH_KEY }}
      #     script: |
      #       cd /var/www/multi-tenant-laravel
      #       git pull origin main
      #       composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
